services:

  # ---------------------------------------------------------------------------
  # MISP (core — always required)
  # ---------------------------------------------------------------------------
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - MISP_ADMIN_EMAIL=admin@tip.local
      - MISP_ADMIN_PASSPHRASE=ChangeMe12345!
      - MISP_BASEURL=http://localhost:8080
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp-password
      - REDIS_HOST=misp-redis
      - REDIS_PORT=6379
      - WORKERS=2
    volumes:
      - misp-data:/var/www/MISP/app/files
      - misp-logs:/var/www/MISP/app/tmp/logs
    depends_on:
      misp-db:
        condition: service_healthy
      misp-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "http://localhost/users/login"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - tip-net

  misp-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root-secret
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp-password
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - misp-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "misp", "-pmisp-password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tip-net

  misp-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - misp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tip-net

  # ---------------------------------------------------------------------------
  # Elasticsearch + Kibana (opt-in — use: docker compose --profile elastic up)
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    restart: unless-stopped
    profiles: ["elastic"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - tip-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    restart: unless-stopped
    profiles: ["elastic"]
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - tip-net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  misp-data:
  misp-logs:
  misp-db-data:
  misp-redis-data:
  elastic-data:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  tip-net:
    driver: bridge
